<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro | Biblioteca Digital</title>
    <link rel="stylesheet" href="home.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="princ">
        <div class="logo-container">
            <img src="g10.png" alt="logo" class="img">
            <span class="logo-text">Libro</span>
        </div>

        <div class="form-wrapper">
            <div class="input-group">
                <input id="pesquisa" type="text" name="pesquisa" placeholder="Pesquisar por título, autor ou categoria...">
                <button id="btn-buscar" class="btn-search">BUSCAR</button>
            </div>
        </div>

        <nav class="navigation">
            <ul class="nav-menu">
                <li><a href="#" id="btn-inicio" class="nav-link">Início</a></li>
                <li><a href="#" id="btn-emprestimos" class="nav-link">Empréstimos</a></li>
                <li><a href="#" id="btn-conta" class="nav-link account-btn">Minha Conta</a></li>
                <li><a href="#" id="btn-sair" class="nav-link">Sair</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <div class="hero-overlay">
            <h1 class="hero-title">Libro</h1>
        </div>

        <!-- ÁREA DE CATEGORIAS (só aparece no início) -->
        <section id="categorias-section" class="categories">
            <h2 class="section-title">Navegar por Matéria</h2>
            <div class="category-grid" id="category-grid">
                <!-- Categorias vão ser carregadas dinamicamente -->
            </div>
        </section>

        <!-- ÁREA DE LIVROS (aparece quando pesquisa ou clica em categoria) -->
        <section id="livros-section" class="books-section" style="display: none;">
            <div class="section-header">
                <h2 class="section-title" id="livros-titulo">Catálogo LIBRO</h2>
                <p class="section-desc" id="livros-desc"></p>
                <button id="btn-voltar" class="btn-voltar" style="display: none;">← Voltar</button>
                <button id = "btn-adicionar-livro" class="btn-voltar"> Adicionar Livro</button>
            </div>
            <div class="books-grid" id="books-grid">
                <!-- Livros vão aparecer aqui -->
            </div>
        </section>

        <!-- ÁREA DE EMPRÉSTIMOS DO USUÁRIO -->
        <section id="emprestimos-section" class="books-section" style="display: none;">
            <div class="section-header">
                <h2 class="section-title">Meus Empréstimos</h2>
                <button id="btn-voltar-emprestimos" class="btn-voltar">← Voltar</button>
            </div>
            <div class="books-grid" id="emprestimos-grid">
                <!-- Empréstimos vão aparecer aqui -->
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p><strong>Libro Biblioteca Digital</strong></p>
            <p>Acesso rápido à informação e conhecimento.</p>
            <div class="footer-bottom">
                &copy; 2026 Todos os direitos reservados.
            </div>
        </div>
    </footer>

    <script src="home.js"></script>
</body>
</html>
